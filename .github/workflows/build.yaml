name: Build taskwarrior-tui (multi-variant)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:22.04

    env:
      MQTT_HOST: test.mosquitto.org
      MQTT_TOPIC: ci/taskwarrior-tui/build
      PROJECT_NAME: taskwarrior-tui
      PROJECT_REPO: https://github.com/kdheepak/taskwarrior-tui.git

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            dpkg-dev \
            fakeroot \
            git \
            libssl-dev \
            mosquitto-clients \
            musl-tools \
            pkg-config \
            upx-ucl

      - name: Resolve version
        id: version
        run: |
          set -euxo pipefail
          git clone --depth 1 "$PROJECT_REPO" source
          cd source
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            CHANNEL="release"
          elif [[ -n "$LATEST_TAG" ]]; then
            VERSION="${LATEST_TAG}b"
            CHANNEL="beta"
          else
            VERSION="0.0.0b"
            CHANNEL="beta"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"

      - name: Notify start
        run: |
          set -euxo pipefail
          mosquitto_pub -h "$MQTT_HOST" -t "$MQTT_TOPIC" \
            -m "status=START project=$PROJECT_NAME version=$VERSION channel=$CHANNEL run=$GITHUB_RUN_NUMBER"

      - name: Install Rust
        run: |
          set -euxo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-musl
          rustc --version
          cargo --version
          mosquitto_pub -h "$MQTT_HOST" -t "$MQTT_TOPIC" \
            -m "status=TOOLCHAIN_READY project=$PROJECT_NAME version=$VERSION rust=$(rustc --version | tr ' ' '_')"

      - name: Build glibc variant
        run: |
          set -euxo pipefail
          . "$HOME/.cargo/env"
          cd source
          RUSTFLAGS='-C link-arg=-s' cargo build --release 2>&1 | tee build-glibc.log
          mosquitto_pub -h "$MQTT_HOST" -t "$MQTT_TOPIC" \
            -m "status=BUILT project=$PROJECT_NAME variant=glibc version=$VERSION"

      - name: Build static musl variant
        run: |
          set -euxo pipefail
          . "$HOME/.cargo/env"
          cd source
          RUSTFLAGS='-C target-feature=+crt-static -C link-arg=-s' \
            cargo build --release --target x86_64-unknown-linux-musl 2>&1 | tee build-musl.log
          mosquitto_pub -h "$MQTT_HOST" -t "$MQTT_TOPIC" \
            -m "status=BUILT project=$PROJECT_NAME variant=static version=$VERSION"

      - name: Package artifacts
        run: |
          set -euxo pipefail

          mkdir -p out logs
          cp source/build-glibc.log logs/
          cp source/build-musl.log logs/

          package_variant() {
            local variant="$1"
            local bin_path="$2"
            local root="/tmp/pkgroot-${variant}"
            local doc_root="${root}/usr/share/doc/${PROJECT_NAME}"
            local tar_name="${PROJECT_NAME}-${VERSION}-${variant}.tar.gz"
            local deb_name="${PROJECT_NAME}-${VERSION}-${variant}.deb"
            local readme_path="out/README-${variant}.md"

            rm -rf "$root" /tmp/deb-${variant}
            mkdir -p "$root/usr/bin" "$doc_root" /tmp/deb-${variant}/DEBIAN
            cp "$bin_path" "$root/usr/bin/${PROJECT_NAME}"

            for doc in README.md CHANGELOG.md LICENSE LICENSE.md; do
              if [[ -f "source/$doc" ]]; then
                cp "source/$doc" "$doc_root/"
              fi
            done

            strip "$root/usr/bin/${PROJECT_NAME}" || true
            upx-ucl --best --lzma "$root/usr/bin/${PROJECT_NAME}" || true

            tar -czf "out/${tar_name}" -C "$root" .

            {
              echo "# Build Artifact (${variant})"
              echo
              echo "Version: ${VERSION}"
              echo
              echo '## Contents'
              tar -tzf "out/${tar_name}" | head -50
            } > "$readme_path"

            printf '%s\n' \
              "Package: ${PROJECT_NAME}" \
              "Version: ${VERSION}" \
              'Section: utils' \
              'Priority: optional' \
              'Architecture: amd64' \
              'Maintainer: ci@example.invalid' \
              "Description: Taskwarrior TUI (${variant} build)" \
              > /tmp/deb-${variant}/DEBIAN/control

            cp -a "$root/." /tmp/deb-${variant}/
            dpkg-deb --build /tmp/deb-${variant} "out/${deb_name}"
          }

          package_variant glibc source/target/release/taskwarrior-tui
          package_variant static source/target/x86_64-unknown-linux-musl/release/taskwarrior-tui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskwarrior-tui-${{ steps.version.outputs.version }}
          path: out/*

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taskwarrior-tui-logs-${{ github.run_number }}
          path: logs/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify completion
        if: always()
        run: |
          set -euxo pipefail
          mosquitto_pub -h "$MQTT_HOST" -t "$MQTT_TOPIC" \
            -m "status=${{ job.status }} project=$PROJECT_NAME version=$VERSION channel=$CHANNEL run=$GITHUB_RUN_NUMBER"
