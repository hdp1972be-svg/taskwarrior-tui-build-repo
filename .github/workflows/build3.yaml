name: Build Lazygit (portable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:20.04

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-go@v4
        with:
          go-version: 1.22.4

      - name: Verify Go install
        run: go version

      - name: Install dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            curl \
            git \
            make \
            gcc \
            build-essential \
            wget

      - name: Show toolchain versions
        run: |
          go version
          gcc --version
          ldd --version

      - name: Build Lazygit
        run: |
          cd lazygit
          go build -gcflags='all=-N -l' -o lazygit

      - name: Package binary
        run: |
          rm -rf out
          mkdir out
          cp lazygit/lazygit ./out/
          tar -czf lazygit-ubuntu22.tar.gz -C out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazygit-ubuntu22
          path: lazygit-ubuntu22.tar.gz
